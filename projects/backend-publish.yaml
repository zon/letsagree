slug: backend-publish
title: Backend container publish
feature: specs/features/backend/publish

requirements:
  - slug: containerfile
    description: Add backend/Containerfile that builds the backend binary and produces a runnable image
    passing: true
    scenarios:
      - title: container image runs the backend
        items:
          - GIVEN the image is built from backend/Containerfile
          - WHEN a container is started from that image
          - THEN the backend HTTP server starts and responds to GET /version
    items:
      - Create backend/Containerfile using a multi-stage Go build; copy the compiled binary into a minimal final stage that runs it as the entrypoint

  - slug: push-backend
    description: Add just push-backend recipe that builds the image, tags with VERSION and latest, and pushes both to ghcr.io
    passing: false
    scenarios:
      - title: push-backend tags with VERSION
        items:
          - GIVEN ./VERSION contains 0.3.0
          - WHEN just push-backend is run
          - THEN the image is pushed to ghcr.io/<owner>/<repo>-backend:0.3.0
          - AND the image is pushed to ghcr.io/<owner>/<repo>-backend:latest
    items:
      - Add push-backend recipe to justfile that reads ./VERSION, builds the image from backend/Containerfile tagged as ghcr.io/<owner>/<repo>-backend:<version> and ghcr.io/<owner>/<repo>-backend:latest, then pushes both tags
