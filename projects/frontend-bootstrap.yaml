slug: frontend-bootstrap
title: Implement frontend bootstrap
feature: frontend/bootstrap
passing: true

requirements:
  - slug: project-setup
    description: >
      Create the Bun project under `frontend/`. Add `package.json` with Elysia,
      elysia-livereload, TypeBox, htmx, and Tailwind CSS as dependencies and a
      `watch` script that starts the server with live reload. The `just frontend`
      recipe in `justfile` already runs `cd frontend && bun watch`.
    items:
      - frontend/package.json exists with elysia, elysia-livereload, typebox, htmx, and tailwindcss dependencies
      - package.json includes a watch script that starts the Elysia server with live reload
    passing: true

  - slug: entry-point
    description: >
      Implement `frontend/src/index.ts`. Use Node's built-in `parseArgs` to accept
      `--addr` (default `:3000`) and `--backend` (default `http://localhost:8080`).
      Read the frontend version by trimming the `VERSION` file at the repo root.
      Mount a `GET /about` route whose handler calls `aboutPage` with a
      `fetchBackendVersion` closure bound to the configured backend URL and the
      version string. Start the Elysia server on the configured address.
    items:
      - --addr flag controls the HTTP listen address, defaulting to :3000
      - --backend flag controls the backend base URL, defaulting to http://localhost:8080
      - VERSION file is read from the repo root and trimmed of whitespace
      - GET /about route calls aboutPage with a fetchBackendVersion closure and the version string
    scenarios:
      - title: "--addr defaults to :3000"
        items:
          - GIVEN the frontend is started with no --addr flag
          - THEN the server listens on :3000
      - title: "--addr flag overrides listen address"
        items:
          - GIVEN the frontend is started with --addr :4000
          - WHEN a client sends GET /about to port 4000
          - THEN the response status is 200 OK
      - title: "--backend flag overrides backend URL"
        items:
          - GIVEN the frontend is started with --backend http://localhost:9090
          - WHEN the about page is requested
          - THEN the frontend fetches the backend version from http://localhost:9090/version
    passing: true

  - slug: backend-client
    description: >
      Implement `fetchBackendVersion` in `frontend/src/backend.ts`. The function
      accepts a backend base URL string, sends `GET <backendUrl>/version`, and
      returns the version string. Returns `null` if the backend is unreachable or
      responds with a non-OK status.
    items:
      - fetchBackendVersion(backendUrl) fetches GET <backendUrl>/version and returns the version string
      - returns null on network error or non-OK response
    passing: true

  - slug: render
    description: >
      Implement `renderAbout` in `frontend/src/render.ts`. The function accepts
      `frontendVersion` (string) and `backendVersion` (string | null) and returns
      a complete HTML string styled with Tailwind CSS. When `backendVersion` is
      `null`, render an unavailable indicator in place of the version string.
    items:
      - renderAbout(frontendVersion, backendVersion) returns an HTML string
      - page displays the frontendVersion string
      - page displays the backendVersion string when it is not null
      - page displays an unavailable indicator when backendVersion is null
      - page is styled with Tailwind CSS

  - slug: orchestration
    description: >
      Implement `aboutPage` in `frontend/src/orchestration.ts`. The function
      accepts an injected `fetchBackendVersion` dependency and a `frontendVersion`
      string, awaits the fetch, then delegates to `renderAbout` with both versions.
    code:
      - name: aboutPage
        description: Orchestrates the about page response by fetching the backend version and delegating to rendering
        module: frontend/src/orchestration.ts
        body: |
          async function aboutPage(
            fetchBackendVersion: () => Promise<string | null>,
            frontendVersion: string,
          ): Promise<string> {
            const backendVersion = await fetchBackendVersion()
            return renderAbout(frontendVersion, backendVersion)
          }

  - slug: tests
    description: >
      Write the two orchestration tests in `frontend/src/orchestration.test.ts`
      using Bun Test. The `backendReturning(version)` helper returns a stub
      `fetchBackendVersion` that resolves to the given version. The
      `backendUnavailable()` helper returns a stub that resolves to `null`.
      Assertion helpers inspect the HTML string for version content and
      unavailable indicators.
    scenarios:
      - title: "GET /about shows both versions"
        items:
          - GIVEN the frontend was started from a repo with VERSION containing 1.2.3
          - AND the backend is running and returns "1.2.3" from GET /version
          - WHEN a client sends GET /about
          - THEN the response status is 200 OK
          - AND the page displays the frontend version 1.2.3
          - AND the page displays the backend version 1.2.3
      - title: "GET /about when backend is unreachable"
        items:
          - GIVEN the backend is not running
          - WHEN a client sends GET /about
          - THEN the response status is 200 OK
          - AND the page displays the frontend version
          - AND the page indicates the backend version is unavailable
    tests:
      - name: about page shows both versions when backend is available
        description: aboutPage returns HTML containing both versions when fetchBackendVersion resolves to a string
        module: frontend/src/orchestration.test.ts
        body: |
          test("about page shows both versions when backend is available", async () => {
            const html = await aboutPage(backendReturning("2.0.0"), "1.0.0")
            assertContainsFrontendVersion(html, "1.0.0")
            assertContainsBackendVersion(html, "2.0.0")
          })
      - name: about page marks backend unavailable when backend cannot be reached
        description: aboutPage returns HTML with unavailable indicator when fetchBackendVersion resolves to null
        module: frontend/src/orchestration.test.ts
        body: |
          test("about page marks backend unavailable when backend cannot be reached", async () => {
            const html = await aboutPage(backendUnavailable(), "1.0.0")
            assertContainsFrontendVersion(html, "1.0.0")
            assertBackendVersionUnavailable(html)
          })

  - slug: version
    description: Bump version for new frontend feature
    version: minor
    items:
      - VERSION file at the repo root is incremented by a minor semver bump
