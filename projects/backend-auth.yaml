slug: backend-auth
title: backend auth — OIDC authentication via Humanity Protocol

feature: specs/features/backend/auth

requirements:
  - slug: store
    description: User and Session GORM models with Postgres-backed implementations of UserStore and SessionStore
    items:
      - Define User model in backend/internal/store with ID uint and Sub string fields; add a unique index on Sub
      - Define Session model in backend/internal/store with ID uint, Token string, and UserID uint field; add an index on Token
      - Implement UserStore.Upsert(sub string) using GORM FirstOrCreate keyed on Sub
      - Implement SessionStore.Create(userID uint) generating a cryptographically random token, persisting the session, and returning the token
      - Implement SessionStore.Get(token string) returning the session or an error if not found
      - Implement SessionStore.Delete(token string) deleting the session row; ignore not-found errors
      - Add test helpers AnySession, WithSession, NoSessions, StubSessions, and StubUsers in backend/internal/store
    passing: true

  - slug: oidc-provider
    description: OIDC provider wrapping go-oidc/v3 and golang.org/x/oauth2, plus the IDToken domain type
    items:
      - Define IDToken in backend/internal/oidc with Sub() string and IsHuman() bool; extract claims from the raw go-oidc IDToken including the custom is_human claim
      - Implement OIDCProvider backed by go-oidc/v3; initialise from humanity-protocol.yaml fields (clientId, clientSecret, issuerUrl, redirectUrl); discover endpoints at startup via the issuer URL
      - AuthURL must request openid and identity:read scopes and embed the state parameter
      - Exchange must verify the ID token signature via JWKS and return a domain IDToken
      - Add a config loader in backend/internal/oidc that reads backend/config/humanity-protocol.yaml into a typed struct
      - Add test helpers AnyIDToken, IDTokenWithIsHuman, and StubProvider in backend/internal/oidc
    passing: true

  - slug: auth-core
    description: Orchestration struct, interfaces, cookie helpers, and test infrastructure shared by all auth handlers
    code:
      - name: Orchestration
        description: Orchestration struct and the OIDCProvider, SessionStore, and UserStore interfaces
        module: backend/internal/auth
        body: |
          type OIDCProvider interface {
            AuthURL(state string) string
            Exchange(ctx context.Context, code string) (*oidc.IDToken, error)
          }

          type SessionStore interface {
            Create(userID uint) (string, error)
            Get(token string) (*store.Session, error)
            Delete(token string) error
          }

          type UserStore interface {
            Upsert(sub string) (*store.User, error)
          }

          type Orchestration struct {
            provider OIDCProvider
            sessions SessionStore
            users    UserStore
          }
    items:
      - Implement NewState() generating a cryptographically random URL-safe string
      - Implement SetStateCookie, StateCookie, SetSessionCookie, SessionCookie, ClearSessionCookie, SetCurrentUser, and CurrentUser helpers in backend/internal/auth
      - All cookies must be HttpOnly and SameSite=Lax
      - Implement WithMocks(overrides ...any) constructing an Orchestration with stub dependencies
      - Implement NewTestContext(method, path) returning an httptest.ResponseRecorder and gin.Context wired to it
      - Implement WithRequestCookie(c, name, value), StateCookieValue(w), and SessionCookieValue(w) test helpers in backend/internal/auth
    passing: true

  - slug: auth-login
    description: Login handler — generates state, sets cookie, redirects to OIDC authorization URL
    scenarios:
      - title: Login redirects to Humanity Protocol
        items:
          - GIVEN the backend is configured with valid credentials
          - WHEN a client sends GET /auth/login
          - THEN the response is a redirect to the Humanity Protocol authorization URL
          - AND the response sets a state cookie
    code:
      - name: Login
        description: Generates a state token, sets the state cookie, and redirects to the OIDC authorization URL
        module: backend/internal/auth
        body: |
          func (o *Orchestration) Login(c *gin.Context) {
            state := NewState()
            SetStateCookie(c, state)
            c.Redirect(http.StatusFound, o.provider.AuthURL(state))
          }
    tests:
      - name: TestLogin_redirectsWithStateCookie
        description: verifies Login redirects and sets a state cookie
        module: backend/internal/auth
        body: |
          func TestLogin_redirectsWithStateCookie(t *testing.T) {
            svc := WithMocks()
            w, c := NewTestContext(http.MethodGet, "/auth/login")
            svc.Login(c)
            assert.Equal(t, http.StatusFound, w.Code)
            assert.NotEmpty(t, StateCookieValue(w))
          }
    passing: true

  - slug: auth-callback
    description: Callback handler — validates state, exchanges code, checks is_human, upserts user, creates session
    scenarios:
      - title: Callback rejects mismatched state
        items:
          - GIVEN a client has a state cookie value of abc123
          - WHEN the client sends GET /auth/callback?code=xyz&state=different
          - THEN the response status is 400 Bad Request
      - title: Callback rejects non-human user
        items:
          - GIVEN the Humanity Protocol returns an ID token with is_human false
          - WHEN the client sends GET /auth/callback with a valid code and matching state
          - THEN the response status is 403 Forbidden
          - AND the response body indicates that biometric verification is required
      - title: Callback authenticates a verified human
        items:
          - GIVEN the Humanity Protocol returns an ID token with sub hp_abc and is_human true
          - WHEN the client sends GET /auth/callback with a valid code and matching state
          - THEN the backend upserts a user record with sub hp_abc
          - AND the response sets a session cookie
          - AND the response redirects to the application
      - title: Callback upserts existing user on re-login
        items:
          - GIVEN a user with sub hp_abc already exists in Postgres
          - WHEN the user completes the OIDC callback again
          - THEN no duplicate user record is created
          - AND a new session is issued
    code:
      - name: Callback
        description: Validates state, exchanges the code, checks is_human, upserts the user, creates a session, and redirects
        module: backend/internal/auth
        body: |
          func (o *Orchestration) Callback(c *gin.Context) {
            if c.Query("state") != StateCookie(c) {
              c.Status(http.StatusBadRequest)
              return
            }

            token, err := o.provider.Exchange(c.Request.Context(), c.Query("code"))
            if err != nil {
              c.Status(http.StatusInternalServerError)
              return
            }

            if !token.IsHuman() {
              c.JSON(http.StatusForbidden, gin.H{"error": "biometric verification required"})
              return
            }

            user, err := o.users.Upsert(token.Sub())
            if err != nil {
              c.Status(http.StatusInternalServerError)
              return
            }

            sessionToken, err := o.sessions.Create(user.ID)
            if err != nil {
              c.Status(http.StatusInternalServerError)
              return
            }

            SetSessionCookie(c, sessionToken)
            c.Redirect(http.StatusFound, "/")
          }
    tests:
      - name: TestCallback_rejectsMismatchedState
        description: verifies Callback returns 400 when state query param does not match the state cookie
        module: backend/internal/auth
        body: |
          func TestCallback_rejectsMismatchedState(t *testing.T) {
            svc := WithMocks()
            w, c := NewTestContext(http.MethodGet, "/auth/callback?code=xyz&state=wrong")
            WithRequestCookie(c, "state", "correct")
            svc.Callback(c)
            assert.Equal(t, http.StatusBadRequest, w.Code)
          }
      - name: TestCallback_rejectsNonHuman
        description: verifies Callback returns 403 when is_human is false
        module: backend/internal/auth
        body: |
          func TestCallback_rejectsNonHuman(t *testing.T) {
            svc := WithMocks(oidc.StubProvider(oidc.IDTokenWithIsHuman(false)))
            w, c := NewTestContext(http.MethodGet, "/auth/callback?code=xyz&state=abc")
            WithRequestCookie(c, "state", "abc")
            svc.Callback(c)
            assert.Equal(t, http.StatusForbidden, w.Code)
          }
      - name: TestCallback_authenticatesHuman
        description: verifies Callback sets a session cookie and redirects when is_human is true
        module: backend/internal/auth
        body: |
          func TestCallback_authenticatesHuman(t *testing.T) {
            svc := WithMocks(oidc.StubProvider(oidc.AnyIDToken()))
            w, c := NewTestContext(http.MethodGet, "/auth/callback?code=xyz&state=abc")
            WithRequestCookie(c, "state", "abc")
            svc.Callback(c)
            assert.Equal(t, http.StatusFound, w.Code)
            assert.NotEmpty(t, SessionCookieValue(w))
          }
      - name: TestCallback_upsertsUser
        description: verifies the sub claim from the ID token is passed to UserStore.Upsert
        module: backend/internal/auth
        body: |
          func TestCallback_upsertsUser(t *testing.T) {
            token := oidc.AnyIDToken()
            users := store.StubUsers()
            svc := WithMocks(oidc.StubProvider(token), users)
            _, c := NewTestContext(http.MethodGet, "/auth/callback?code=xyz&state=abc")
            WithRequestCookie(c, "state", "abc")
            svc.Callback(c)
            assert.Equal(t, token.Sub(), users.UpsertedSub(t))
          }
    passing: true

  - slug: auth-require-auth
    description: RequireAuth middleware — validates session cookie and sets current user in context
    scenarios:
      - title: Protected route requires session
        items:
          - GIVEN a client sends no session cookie
          - WHEN the client accesses a protected route
          - THEN the response status is 401 Unauthorized
      - title: Protected route accepts valid session
        items:
          - GIVEN a client has a valid session cookie
          - WHEN the client accesses a protected route
          - THEN the handler proceeds and the authenticated user is available
    code:
      - name: RequireAuth
        description: Validates the session cookie and sets the current user in context, or aborts with 401
        module: backend/internal/auth
        body: |
          func (o *Orchestration) RequireAuth(c *gin.Context) {
            session, err := o.sessions.Get(SessionCookie(c))
            if err != nil {
              c.AbortWithStatus(http.StatusUnauthorized)
              return
            }
            SetCurrentUser(c, session.UserID)
            c.Next()
          }
    tests:
      - name: TestRequireAuth_rejectsNoSession
        description: verifies RequireAuth aborts with 401 when no session cookie is present
        module: backend/internal/auth
        body: |
          func TestRequireAuth_rejectsNoSession(t *testing.T) {
            svc := WithMocks(store.NoSessions())
            w, c := NewTestContext(http.MethodGet, "/protected")
            svc.RequireAuth(c)
            assert.Equal(t, http.StatusUnauthorized, w.Code)
          }
      - name: TestRequireAuth_setsCurrentUser
        description: verifies RequireAuth stores the session user ID in context when the session is valid
        module: backend/internal/auth
        body: |
          func TestRequireAuth_setsCurrentUser(t *testing.T) {
            session := store.AnySession()
            svc := WithMocks(store.WithSession(session))
            _, c := NewTestContext(http.MethodGet, "/protected")
            WithRequestCookie(c, "session", session.Token)
            svc.RequireAuth(c)
            assert.Equal(t, session.UserID, CurrentUser(c))
          }
    passing: false

  - slug: auth-logout
    description: Logout handler — deletes session from Postgres and clears the session cookie
    scenarios:
      - title: Logout clears session
        items:
          - GIVEN a client has a valid session cookie
          - WHEN the client sends POST /auth/logout
          - THEN the session is deleted from Postgres
          - AND the session cookie is cleared
          - AND the response status is 204 No Content
    code:
      - name: Logout
        description: Deletes the session and clears the session cookie
        module: backend/internal/auth
        body: |
          func (o *Orchestration) Logout(c *gin.Context) {
            o.sessions.Delete(SessionCookie(c))
            ClearSessionCookie(c)
            c.Status(http.StatusNoContent)
          }
    tests:
      - name: TestLogout_deletesSession
        description: verifies Logout removes the session from the store
        module: backend/internal/auth
        body: |
          func TestLogout_deletesSession(t *testing.T) {
            sessions := store.StubSessions()
            svc := WithMocks(sessions)
            _, c := NewTestContext(http.MethodPost, "/auth/logout")
            WithRequestCookie(c, "session", "tok123")
            svc.Logout(c)
            assert.False(t, sessions.Has("tok123"))
          }
      - name: TestLogout_clearsSessionCookie
        description: verifies Logout clears the session cookie on the response
        module: backend/internal/auth
        body: |
          func TestLogout_clearsSessionCookie(t *testing.T) {
            svc := WithMocks()
            w, c := NewTestContext(http.MethodPost, "/auth/logout")
            svc.Logout(c)
            assert.Empty(t, SessionCookieValue(w))
          }
    passing: false

  - slug: server-wiring
    description: Register auth routes and wire dependencies in the server entry point
    items:
      - Load backend/config/humanity-protocol.yaml and initialise the OIDC provider in backend/cmd/server
      - Open a GORM Postgres connection and auto-migrate User and Session models
      - Construct the auth Orchestration with the real OIDC provider, session store, and user store
      - Register GET /auth/login, GET /auth/callback, and POST /auth/logout routes
      - Register the RequireAuth middleware on protected route groups
    passing: false

  - slug: version-bump
    description: Bump version for the auth feature release
    version: minor
    items:
      - Bump VERSION and helm/Chart.yaml appVersion by a minor increment; bump helm/Chart.yaml version by a patch increment
    passing: false
