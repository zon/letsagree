slug: agreectl-set-config-humanity-protocol
title: agreectl set config — write Humanity Protocol config from env file or Kubernetes secret

feature: specs/features/agreectl/set-config-humanity-protocol

requirements:
  - slug: opts-hp-fields
    description: Add HP-specific fields and constructors to Opts
    items:
      - Add RalphNamespace (default "ralph-letsagree"), HPSecret (default "humanity-protocol"), HPEnvFile, OIDCIssuer (default "https://api.sandbox.humanity.org/v2"), and OIDCRedirect fields to opts.Opts
      - Add AnyHP, WithHPEnvFile, and WithOIDCOptions constructors in agreectl/internal/opts
    passing: true

  - slug: cluster-hp
    description: Add UpsertSecret to the cluster client and HP credential accessors to Secret
    items:
      - Add UpsertSecret(namespace, name string, data map[string]string) error to the K8sClient implementation; create or update the named secret using apply semantics
      - Add ClientID(), ClientSecret(), and PublicKey() methods to cluster.Secret reading from data keys "clientId", "clientSecret", and "publicKey"
      - Add test helpers AnyHPSecret, ThatFailsOnGetSecret, ThatFailsOnUpsert, and UpsertedSecretData in agreectl/internal/cluster
    passing: true

  - slug: files-hp
    description: Add YAML writing, env file parsing, and HP config types to the files module
    scenarios:
      - title: output directory is created if missing
        items:
          - GIVEN backend/config/ does not exist
          - WHEN the command runs successfully
          - THEN backend/config/ is created and backend/config/humanity-protocol.yaml is written
      - title: env file missing required key — exits with error
        items:
          - GIVEN the env file is missing HUMANITY_CLIENT_SECRET
          - WHEN agreectl set config --hp-env backend/config/env.sandbox --oidc-redirect https://example.com/auth/callback is run
          - THEN the command exits with an error naming HUMANITY_CLIENT_SECRET as missing
    items:
      - Add WriteYAML(path string, v any) error to the ConfigWriter interface and its real implementation; marshal v as YAML and write to path, creating parent directories if needed
      - Add ParseHPEnv(path string) (HPCredentials, error) to the ConfigWriter interface and real implementation; parse HUMANITY_CLIENT_ID, HUMANITY_CLIENT_SECRET, and HUMANITY_PUBLIC_KEY; ignore lines beginning with #; return an error naming any missing keys
      - Define HPCredentials struct in agreectl/internal/files with ClientID, ClientSecret, and PublicKey fields
      - Add ToSecretData() on HPCredentials returning map[string]string with keys clientId, clientSecret, and publicKey
      - Define HumanityProtocolConfig struct in agreectl/internal/files with ClientID, ClientSecret, PublicKey, IssuerURL, and RedirectURL fields tagged for YAML serialization
      - Define HumanityProtocolConfigPath constant in agreectl/internal/files as "backend/config/humanity-protocol.yaml"
      - Add test helpers AnyHPCredentials, WithHPEnv, and WrittenYAMLAt in agreectl/internal/files
    passing: false

  - slug: hp-orchestration
    description: Add HumanityProtocol method and extend the orchestration interfaces
    scenarios:
      - title: env file provided — writes local config and cluster secret
        items:
          - GIVEN the env file contains valid HUMANITY_CLIENT_ID, HUMANITY_CLIENT_SECRET, and HUMANITY_PUBLIC_KEY
          - WHEN agreectl set config --hp-env backend/config/env.sandbox --oidc-redirect https://example.com/auth/callback is run
          - THEN the Kubernetes secret humanity-protocol is written to the ralph-letsagree namespace with the parsed credential values
          - AND backend/config/humanity-protocol.yaml is written with all five fields populated
      - title: no env file and secret present — pulls from cluster
        items:
          - GIVEN the Kubernetes secret humanity-protocol exists in the ralph-letsagree namespace
          - AND --hp-env is not provided
          - WHEN agreectl set config --oidc-redirect https://example.com/auth/callback is run
          - THEN backend/config/humanity-protocol.yaml is written using credential values from the cluster secret
          - AND no Kubernetes secret write is performed
      - title: no env file and secret absent — exits with error
        items:
          - GIVEN the Kubernetes secret humanity-protocol does not exist in the ralph-letsagree namespace
          - AND --hp-env is not provided
          - WHEN agreectl set config is run
          - THEN the command exits with an error instructing the user to provide --hp-env
    items:
      - Extend the K8sClient interface in agreectl/internal/orchestration with UpsertSecret(namespace, name string, data map[string]string) error
      - Extend the ConfigWriter interface in agreectl/internal/orchestration with WriteYAML(path string, v any) error and ParseHPEnv(path string) (files.HPCredentials, error)
      - Remove the redundant ConfigWriter interface from agreectl/internal/files; only the orchestration-defined interface is needed
    code:
      - name: HumanityProtocol
        description: Resolves HP credentials from an env file or cluster secret, upserts the cluster secret when an env file is provided, and writes backend/config/humanity-protocol.yaml
        module: agreectl/internal/orchestration
        body: |
          func (o *Orchestration) HumanityProtocol(in opts.Opts) error {
            var creds files.HPCredentials

            if in.HPEnvFile != "" {
              parsed, err := o.files.ParseHPEnv(in.HPEnvFile)
              if err != nil {
                return err
              }
              if err := o.cluster.UpsertSecret(in.RalphNamespace, in.HPSecret, parsed.ToSecretData()); err != nil {
                return err
              }
              creds = parsed
            } else {
              secret, err := o.cluster.GetSecret(in.RalphNamespace, in.HPSecret)
              if err != nil {
                return err
              }
              creds = files.HPCredentials{
                ClientID:     secret.ClientID(),
                ClientSecret: secret.ClientSecret(),
                PublicKey:    secret.PublicKey(),
              }
            }

            return o.files.WriteYAML(files.HumanityProtocolConfigPath, files.HumanityProtocolConfig{
              ClientID:     creds.ClientID,
              ClientSecret: creds.ClientSecret,
              PublicKey:    creds.PublicKey,
              IssuerURL:    in.OIDCIssuer,
              RedirectURL:  in.OIDCRedirect,
            })
          }
    passing: false

  - slug: hp-tests
    description: Tests for the HumanityProtocol orchestration method
    items:
      - Extend orchestration.WithMocks to accept cluster.ThatFailsOnGetSecret, cluster.ThatFailsOnUpsert, and files.WithHPEnv overrides
    tests:
      - name: TestHumanityProtocol_envFileUpsertClusterSecret
        description: verifies the cluster secret is upserted with credential data from the env file
        module: agreectl/internal/orchestration
        body: |
          func TestHumanityProtocol_envFileUpsertClusterSecret(t *testing.T) {
            creds := files.AnyHPCredentials()
            svc := orchestration.WithMocks(
              cluster.ThatFailsOnGetSecret(),
              files.WithHPEnv(creds),
            )
            require.NoError(t, svc.HumanityProtocol(opts.WithHPEnvFile("any.env")))
            assert.Equal(t, creds.ToSecretData(), cluster.UpsertedSecretData(t))
          }
      - name: TestHumanityProtocol_envFileWritesLocalConfig
        description: verifies credential fields from the env file are written to the local YAML config
        module: agreectl/internal/orchestration
        body: |
          func TestHumanityProtocol_envFileWritesLocalConfig(t *testing.T) {
            creds := files.AnyHPCredentials()
            svc := orchestration.WithMocks(files.WithHPEnv(creds))
            require.NoError(t, svc.HumanityProtocol(opts.WithHPEnvFile("any.env")))
            cfg := files.WrittenYAMLAt(t, files.HumanityProtocolConfigPath, &files.HumanityProtocolConfig{})
            assert.Equal(t, creds.ClientID, cfg.ClientID)
            assert.Equal(t, creds.ClientSecret, cfg.ClientSecret)
            assert.Equal(t, creds.PublicKey, cfg.PublicKey)
          }
      - name: TestHumanityProtocol_secretPresentWritesLocalConfig
        description: verifies credential fields from the cluster secret are written to the local YAML config when no env file is provided
        module: agreectl/internal/orchestration
        body: |
          func TestHumanityProtocol_secretPresentWritesLocalConfig(t *testing.T) {
            secret := cluster.AnyHPSecret()
            svc := orchestration.WithMocks(cluster.WithSecret(secret))
            require.NoError(t, svc.HumanityProtocol(opts.AnyHP()))
            cfg := files.WrittenYAMLAt(t, files.HumanityProtocolConfigPath, &files.HumanityProtocolConfig{})
            assert.Equal(t, secret.ClientID(), cfg.ClientID)
            assert.Equal(t, secret.ClientSecret(), cfg.ClientSecret)
            assert.Equal(t, secret.PublicKey(), cfg.PublicKey)
          }
      - name: TestHumanityProtocol_secretPresentSkipsUpsert
        description: verifies UpsertSecret is not called when pulling credentials from the cluster
        module: agreectl/internal/orchestration
        body: |
          func TestHumanityProtocol_secretPresentSkipsUpsert(t *testing.T) {
            svc := orchestration.WithMocks(cluster.ThatFailsOnUpsert())
            require.NoError(t, svc.HumanityProtocol(opts.AnyHP()))
          }
      - name: TestHumanityProtocol_writesOIDCOptions
        description: verifies issuer and redirect URL from opts are written to the local YAML config
        module: agreectl/internal/orchestration
        body: |
          func TestHumanityProtocol_writesOIDCOptions(t *testing.T) {
            svc := orchestration.WithMocks()
            require.NoError(t, svc.HumanityProtocol(opts.WithOIDCOptions("https://issuer.example.com", "https://app.example.com/auth/callback")))
            cfg := files.WrittenYAMLAt(t, files.HumanityProtocolConfigPath, &files.HumanityProtocolConfig{})
            assert.Equal(t, "https://issuer.example.com", cfg.IssuerURL)
            assert.Equal(t, "https://app.example.com/auth/callback", cfg.RedirectURL)
          }
    passing: false

  - slug: cli-hp-flags
    description: Wire Humanity Protocol flags into the agreectl CLI entry point
    scenarios:
      - title: custom context, namespace, and secret name
        items:
          - GIVEN --context k3s-prod --ralph-namespace infra --hp-secret hp-creds are provided
          - THEN the secret hp-creds is read from or written to namespace infra using context k3s-prod
    items:
      - Add --ralph-namespace (default ralph-letsagree), --hp-secret (default humanity-protocol), --hp-env, --oidc-issuer (default https://api.sandbox.humanity.org/v2), and --oidc-redirect flags to the set config command in agreectl/cmd/agreectl
      - Populate the corresponding opts.Opts fields from the flags and call HumanityProtocol on the orchestration
    passing: false
