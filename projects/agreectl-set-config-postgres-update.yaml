slug: agreectl-set-config-postgres-update
title: agreectl set config postgres — copy secret to ralph namespace, rename host/port flags

feature: specs/features/agreectl/set-config-postgres

requirements:
  - slug: opts-update
    description: Rename Host/Port fields to DBHost/DBPort in opts.Opts, add RalphNamespace, and update constructors
    items:
      - Rename the Host field to DBHost and Port field to DBPort in opts.Opts in agreectl/internal/opts
      - Add RalphNamespace string field to opts.Opts with default value "ralph-letsagree" in defaultOpts
      - Rename WithHost to WithDBHost, AnyPort to AnyDBPort, and WithPort to WithDBPort in agreectl/internal/opts
      - Add WithRalphNamespace(ns string) Opts constructor in agreectl/internal/opts
    passing: true

  - slug: secret-data
    description: Add Data() to cluster.Secret and UpsertSecret to K8sClient
    items:
      - Add Data() map[string]string method to cluster.Secret in agreectl/internal/cluster; decode each entry in s.Data from []byte to string
      - Add UpsertSecret(namespace, name string, data map[string]string) error to the K8sClient interface in agreectl/internal/cluster
      - Implement UpsertSecret on realK8sClient using server-side apply semantics in agreectl/internal/cluster
      - Add UpsertSecret to stubK8sClient and capturingK8sClient with a no-op implementation in agreectl/internal/cluster
      - Add ThatFailsOnUpsert() K8sClient test helper that fails the test if UpsertSecret is called in agreectl/internal/cluster
      - Add UpsertedSecretData(t) map[string]string test helper that returns the data from the most recent UpsertSecret call; fails the test if no upsert occurred in agreectl/internal/cluster
    passing: true

  - slug: postgres-orchestration
    description: Update Postgres orchestration to copy secret to ralph namespace and use renamed opts fields
    code:
      - name: Postgres
        description: Reads the CNPG secret, copies it to the ralph namespace, resolves the external host, and writes postgres.json
        module: agreectl/internal/orchestration
        body: |
          func (o *Orchestration) Postgres(in opts.Opts) error {
            secret, err := o.cluster.GetSecret(in.Namespace, in.DBSecret)
            if err != nil {
              return err
            }

            if err := o.cluster.UpsertSecret(in.RalphNamespace, in.DBSecret, secret.Data()); err != nil {
              return err
            }

            host := in.DBHost
            if host == "" {
              host, err = o.cluster.NodeIP()
              if err != nil {
                return err
              }
            }

            return o.files.WriteJSON(files.PostgresConfigPath, files.PostgresConfig{
              Host:     host,
              Port:     in.DBPort,
              User:     secret.User(),
              Password: secret.Password(),
              DBName:   secret.DBName(),
            })
          }
    tests:
      - name: TestPostgres_autoDetectsNodeIP
        description: verifies Postgres writes the auto-detected node IP as the host
        module: agreectl/internal/orchestration
        body: |
          func TestPostgres_autoDetectsNodeIP(t *testing.T) {
            ip := cluster.AnyNodeIP()
            svc := orchestration.WithMocks(cluster.WithNodeIP(ip))
            require.NoError(t, svc.Postgres(opts.Any()))
            assert.Equal(t, ip, files.WrittenAt(t, files.PostgresConfigPath, &files.PostgresConfig{}).Host)
          }
      - name: TestPostgres_usesProvidedHost
        description: verifies Postgres uses the DBHost from opts and skips node IP detection
        module: agreectl/internal/orchestration
        body: |
          func TestPostgres_usesProvidedHost(t *testing.T) {
            svc := orchestration.WithMocks(cluster.ThatFailsOnNodeIP())
            require.NoError(t, svc.Postgres(opts.WithDBHost("localhost")))
            assert.Equal(t, "localhost", files.WrittenAt(t, files.PostgresConfigPath, &files.PostgresConfig{}).Host)
          }
      - name: TestPostgres_copiesSecretFields
        description: verifies user, password, and dbname are copied from the secret into postgres.json
        module: agreectl/internal/orchestration
        body: |
          func TestPostgres_copiesSecretFields(t *testing.T) {
            s := cluster.AnySecret()
            svc := orchestration.WithMocks(cluster.WithSecret(s))
            require.NoError(t, svc.Postgres(opts.Any()))
            cfg := files.WrittenAt(t, files.PostgresConfigPath, &files.PostgresConfig{})
            assert.Equal(t, s.User(), cfg.User)
            assert.Equal(t, s.Password(), cfg.Password)
            assert.Equal(t, s.DBName(), cfg.DBName)
          }
      - name: TestPostgres_usesOptsPort
        description: verifies the DBPort from opts is written as the port in postgres.json
        module: agreectl/internal/orchestration
        body: |
          func TestPostgres_usesOptsPort(t *testing.T) {
            port := opts.AnyDBPort()
            svc := orchestration.WithMocks()
            require.NoError(t, svc.Postgres(opts.WithDBPort(port)))
            assert.Equal(t, port, files.WrittenAt(t, files.PostgresConfigPath, &files.PostgresConfig{}).Port)
          }
      - name: TestPostgres_copiesSecretToRalphNamespace
        description: verifies the postgres secret is upserted into the ralph namespace with its full data
        module: agreectl/internal/orchestration
        body: |
          func TestPostgres_copiesSecretToRalphNamespace(t *testing.T) {
            secret := cluster.AnySecret()
            svc := orchestration.WithMocks(cluster.WithSecret(secret))
            require.NoError(t, svc.Postgres(opts.WithRalphNamespace("ralph-letsagree")))
            assert.Equal(t, secret.Data(), cluster.UpsertedSecretData(t))
          }
    passing: true

  - slug: cli-update
    description: Rename --host/--port to --db-host/--db-port and add --ralph-namespace to the set config command
    items:
      - Rename the Host field to DBHost and name tag to "db-host" in SetConfig in agreectl/cmd/agreectl
      - Rename the Port field to DBPort and name tag to "db-port" in SetConfig in agreectl/cmd/agreectl
      - Add RalphNamespace string field with name "ralph-namespace" and default "ralph-letsagree" to SetConfig in agreectl/cmd/agreectl
      - Update RunWith to populate opts.Opts DBHost, DBPort, and RalphNamespace from the corresponding SetConfig fields
    passing: true
