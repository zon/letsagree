workflow:
  namespace: ralph-letsagree
  secrets:
    - name: postgres
      destFile: backend/config/postgres.json
    - name: humanity-protocol
      destFile: backend/config/humanity-protocol.yaml
model: minimax/MiniMax-M2.7

before:
  - name: compile
    command: just
    args: [build-backend]

services:
  - name: backend
    command: just
    args: [backend]
    port: 8080
